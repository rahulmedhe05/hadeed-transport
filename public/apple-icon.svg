<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0d0d1a"/>
  <!-- Gold gradient -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#c8a35a"/>
      <stop offset="100%" stop-color="#b8963a"/>
    </linearGradient>
  </defs>
  <!-- H letter -->
  <text x="90" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="110" fill="url(#gold)">H</text>
</svg>
